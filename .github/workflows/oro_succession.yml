name: ORO_Sovereign_Rail_Automation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  process-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Sync Script
        run: |
          chmod +x oro_sync.sh
          ./oro_sync.sh
